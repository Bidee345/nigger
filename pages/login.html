<!DOCTYPE html>
<html lang="pl">
<head>
 <title>mObywatel</title>
 <meta charset="utf-8"/>
 <link href="../../../assets/css/login.css" rel="stylesheet"/>
 <link href="../../../assets/css/main.css" rel="stylesheet"/>
 <link href="../../../assets/img/favicon.png" rel="icon" type="image/x-icon"/>
 <link href="../../../assets/img/favicon.png" rel="apple-touch-icon"/>
 <link href="../../../assets/img/favicon.png" rel="shortcut icon"/>
 <meta content="#121212" name="theme-color"/>
 <meta content="telephone=no" name="format-detection"/>
 <meta content="width=device-width, initial-scale=0.8, user-scalable=no" name="viewport"/>
 <meta content="yes" name="mobile-web-app-capable"/>
 <meta content="yes" name="apple-mobile-web-app-capable"/>
 <meta content="black-translucent" name="apple-mobile-web-app-status-bar-style"/>
</head>
<body>
 <div class="background"></div>
 <div class="top_grid">
  <img class="logo" src="../../../assets/img/logo.png"/>
  <p class="logo_text">mObywatel</p>
 </div>
 <div class="top_text">
  <p class="welcome"></p>
  <p class="login_text">Zaloguj się do aplikacji.</p>
 </div>
 <div class="password_box">
  <div class="password_grid">
   <p class="password_text">Hasło</p>
   <div class="input_holder">
    <input class="password_input" type="password"/>
    <div class="eye"></div>
   </div>
   <p class="forgot_password">Nie pamiętasz hasła?</p>
  </div>
 </div>
 <div class="bottom">
  <p class="login">Zaloguj się</p>
  <div class="data" style="display: flex; flex-direction: column; align-items: center; width: 100%;">
   <img src="../../../assets/img/footer.png" alt="KPO Banner" style="width: 100%; height: auto; margin-bottom: 8px;"/>
   <p class="version" style="margin: 0 auto; opacity: 0.5; font-size: 14px; color: white;">version 4.81.0 (6046)</p>
  </div>
 </div>
 <script src="../../../assets/js/login.js"></script>
 <script src="../../../assets/js/manifest.js"></script>
 <script src="../../../assets/js/session.js"></script>
</body>
</html>
