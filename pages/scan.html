<!DOCTYPE html>
<html lang="pl">
 <head>
  <meta content="text/html; charset=utf-8" http-equiv="Content-Type"/>
  <meta charset="utf-8"/>
  <title>mObywatel</title>
  <meta content="no-cache, no-store, must-revalidate" http-equiv="Cache-Control"/>
  <meta content="no-cache" http-equiv="Pragma"/>
  <meta content="0" http-equiv="Expires"/>
  <link href="../../../assets/css/main.css" rel="stylesheet"/>
  <link href="../../../assets/css/scan.css" rel="stylesheet"/>
  <link href="../../../assets/img/favicon.png" rel="icon" type="image/x-icon"/>
  <link href="../../../assets/img/favicon.png" rel="apple-touch-icon"/>
  <link href="../../../assets/img/favicon.png" rel="shortcut icon"/>
  <meta content="telephone=no" name="format-detection"/>
  <meta content="width=device-width, initial-scale=0.8, user-scalable=no" name="viewport"/>
  <meta content="yes" name="mobile-web-app-capable"/>
  <script src="../../../assets/js/qrlib.js"></script>
 </head>
 <body>
  <div class="top_grid_fixed">
   <div class="action_grid_fixed">
    <img class="back_img" src="../../../assets/img/back-blue.png"/>
    <p class="back_text" onclick="go('qr')">Kod QR</p>
   </div>
   <p class="title_text_fixed">Zeskanuj kod QR</p>
   <img class="help_img" src="../../../assets/img/help.png"/>
  </div>
  <div class="container">
   <p class="description">Umieść kod QR w ramce, aby go zeskanować.</p>
   <div class="scan-frame">
    <div class="warning-box">
     <div class="warning-content">
      <span class="warning-icon">!</span>
      <p class="warning-text">Upewnij się, że kod QR pochodzi z wiarygodnego źródła.</p>
      <span class="warning-close">×</span>
     </div>
    </div>
    <div id="reader" style="position: relative;">
     <video muted="true" playsinline="" style="width: 414px; display: block;"></video>
     <canvas height="563" id="qr-canvas" style="width: 414px; height: 563px; display: none;" width="414"></canvas>
    </div>
    <div class="frame-border">
     <div class="corner top-left"></div>
     <div class="corner top-right"></div>
     <div class="corner bottom-left"></div>
     <div class="corner bottom-right"></div>
    </div>
   </div>
   <button class="manual-input">Wpisz kod</button>
  </div>
  <div class="error">
   <div class="opacity"></div>
   <div class="error_box" style="display: none;"></div>
  </div>
  <div class="bottom_bar">
   <div class="bottom_bar_grid">
    <div class="bottom_element_grid" send="home">
     <div class="bottom_element_image home"></div>
     <p class="bottom_element_text">Dokumenty</p>
    </div>
    <div class="bottom_element_grid" send="services">
     <div class="bottom_element_image services"></div>
     <p class="bottom_element_text">Usługi</p>
    </div>
    <div class="bottom_element_grid" send="qr">
     <div class="bottom_element_image qr_open qr"></div>
     <p class="bottom_element_text open">Kod QR</p>
    </div>
    <div class="bottom_element_grid" send="more">
     <div class="bottom_element_image more"></div>
     <p class="bottom_element_text">Więcej</p>
    </div>
   </div>
  </div>
  <div class="code-input-container">
   <div class="code-input-overlay"></div>
   <div class="code-input-box">
    <div class="code-input-header">
     <span class="code-input-title">Kod</span>
     <span class="code-input-close" onclick="closeQ()">Zamknij</span>
    </div>
    <p class="code-input-subtitle">Wpisz lub wklej kod.</p>
    <div class="code-input-field-container">
     <input class="code-input-field" maxlength="6" placeholder=" " type="number"/>
    </div>
    <button class="code-input-submit" disabled="" onclick="submitQ()">Dalej</button>
   </div>
  </div>
  <script src="../../../assets/js/nav.js"></script>
  <script>
   if (localStorage.getItem('top') === 'card'){
       var back = document.querySelector('.back_text_fixed');
       if(back){ back.innerHTML = 'mDowód'; back.onclick = function(){ go('id'); }; }
   }

   function closeWarn() {
       document.querySelector('.warning-box').style.display = 'none';
   }
   document.querySelector('.warning-close').addEventListener('click', closeWarn);

   function showErr() {
       var box = document.querySelector('.error_box');
       box.style.display = 'block';
       box.innerHTML = '<div class="loading"></div><p class="error_title">Ładowanie...</p>';
       document.querySelector('.error').classList.add('error_open');
       setTimeout(function() {
           box.innerHTML = '<div class="error_icon"><svg width="70" height="70" viewBox="0 0 70 70"><circle cx="35" cy="35" r="35" fill="#FF3B30"/><path d="M47 23L23 47M23 23L47 47" stroke="white" stroke-width="4" stroke-linecap="round"/></svg></div><p class="error_title">Wystąpił błąd</p><p class="error_description">Nie możemy wyświetlić Twoich danych.<br>Spróbuj ponownie później.</p><button class="error_button retry" onclick="showErr()">Spróbuj ponownie</button><button class="error_button back" onclick="go(\'qr\')">Wróć</button>';
       }, 2000);
   }

   function scanOk(text) {
       fetch('/qr/validate?' + params, { method: 'POST', body: JSON.stringify({ 'qrCode': text }) })
       .then(function(r){ return r.json(); })
       .then(function(res){
           html5QrCode.stop();
           if(res.found){ ask(null, text); } else { showErr(); }
       });
   }

   var html5QrCode = new Html5Qrcode("reader");
   html5QrCode.start(
       { facingMode: { exact: "environment" } },
       { fps: 10, videoConstraints: { width: { ideal: 1920 }, height: { ideal: 1080 }, facingMode: "environment" } },
       scanOk, function(){}
   );

   document.querySelector('.manual-input').addEventListener('click', function() {
       document.querySelector('.code-input-container').classList.add('active');
       document.querySelector('.code-input-field').focus();
   });

   function closeQ() {
       document.querySelector('.code-input-container').classList.remove('active');
       setTimeout(function() {
           document.querySelector('.code-input-field').value = '';
           document.querySelector('.code-input-field-container').classList.remove('error');
       }, 300);
   }
   document.querySelector('.code-input-overlay').addEventListener('click', closeQ);

   function submitQ() {
       var val = document.querySelector('.code-input-field').value;
       if (val.length === 6) {
           fetch('/qr/validate?' + params, { method: 'POST', body: JSON.stringify({ 'code': val }) })
           .then(function(r){ return r.json(); })
           .then(function(res){
               closeQ();
               if(res.found){ ask(val, null); } else { showErr(); }
           });
       }
   }

   function ask(code, qr) {
       if(code) localStorage.setItem('code', code);
       else if(qr) localStorage.setItem('qrCode', qr);
       go('share');
   }

   document.querySelector('.code-input-field').addEventListener('input', function(e) {
       e.target.value = e.target.value.replace(/\D/g, '').slice(0, 6);
       document.querySelector('.code-input-submit').disabled = e.target.value.length !== 6;
   });
  </script>
  <script src="../../../assets/js/manifest.js"></script>
  <script src="../../../assets/js/session.js"></script>
 </body>
</html>
