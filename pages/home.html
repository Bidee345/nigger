<!DOCTYPE html>
<html lang="pl">
<head>
 <title>mObywatel</title>
 <meta charset="utf-8"/>
 <link href="../../../assets/css/home.css" rel="stylesheet"/>
 <link href="../../../assets/css/main.css" rel="stylesheet"/>
 <link href="../../../assets/img/favicon.png" rel="icon" type="image/x-icon"/>
 <link href="../../../assets/img/favicon.png" rel="apple-touch-icon"/>
 <link href="../../../assets/img/favicon.png" rel="shortcut icon"/>
 <meta content="#121212" name="theme-color"/>
 <meta content="telephone=no" name="format-detection"/>
 <meta content="width=device-width, initial-scale=0.8, user-scalable=no, viewport-fit=cover" name="viewport"/>
 <meta content="yes" name="mobile-web-app-capable"/>
 <meta content="yes" name="apple-mobile-web-app-capable"/>
 <meta content="black-translucent" name="apple-mobile-web-app-status-bar-style"/>
</head>
<body>
 <div class="bottom_bar">
  <div class="bottom_bar_grid">
   <div class="bottom_element_grid" send="home">
    <div class="bottom_element_image home_open home"></div>
    <p class="bottom_element_text open">Dokumenty</p>
   </div>
   <div class="bottom_element_grid" send="services">
    <div class="bottom_element_image services"></div>
    <p class="bottom_element_text">Usługi</p>
   </div>
   <div class="bottom_element_grid" send="qr">
    <div class="bottom_element_image qr"></div>
    <p class="bottom_element_text">Kod QR</p>
   </div>
   <div class="bottom_element_grid" send="more">
    <div class="bottom_element_image more"></div>
    <p class="bottom_element_text">Więcej</p>
   </div>
  </div>
 </div>
 <div class="container">
  <div class="top_grid">
   <img class="top_image" src="../../../assets/img/logo.png"/>
   <img class="top_image right" src="../../../assets/img/bell.png"/>
  </div>
  <div class="card_grid">
   <p class="title">Dokumenty</p>
   <p class="subtitle">Dostosuj</p>
   <p class="subtitle">Dodaj</p>
  </div>
  <div class="stack">
   <div class="card" onclick="go('id')" style="background-image: url('https://i.imgur.com/VkZ6DsQ.png');">
    <p class="cardcontent">mDowód</p>
    <img alt="Logo" class="logo" src="../../../assets/img/card-logo.png"/>
   </div>
  </div>
 </div>
 <script src="../../../assets/js/nav.js"></script>
 <script src="../../../assets/js/manifest.js"></script>
 <script src="../../../assets/js/home.js"></script>
 <script src="../../../assets/js/session.js"></script>
</body>
</html>
